openapi: 3.0.0
info:
  title: Volunteer Notifier
  version: 1.0.0
  description: Dispara alertas para os voluntários via WhatsApp.
servers:
  - url: http://localhost:8000
paths:
  /volunteers/notify:
    post:
      operationId: notifyVolunteers
      summary: Envia uma notificação ativa aos voluntários para um incidente.
      description: >
        Usa a API do Twilio para disparar uma mensagem de WhatsApp para a
        lista de voluntários informados. O Agente deve acionar isso como passo
        final da coordenação.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - incident_id
                - volunteer_ids
              properties:
                incident_id:
                  type: string
                  description: O ID do incidente (ex. inc-00X)
                volunteer_ids:
                  type: array
                  items:
                    type: string
                  description: Lista de IDs dos voluntários selecionados (ex. v1, v2)
                message_override:
                  type: string
                  description: Opcional. Se quiser enviar uma mensagem personalizada.
      responses:
        '200':
          description: Resultado do envio.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  notified_count:
                    type: integer
