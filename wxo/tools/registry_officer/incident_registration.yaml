openapi: 3.0.0
info:
  title: Incident Registrar
  version: 1.0.0
  description: Registers a new incident in the system, generating the ID automatically.
servers:
  - url: https://e59a-201-93-250-33.ngrok-free.app
paths:
  /incidents:
    post:
      operationId: createIncident
      summary: Registers the incident after the initial screening.
      description: >
        The Lead Agent should use this tool to create the incident in the database 
        without having to ask the user for the ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - description
                - location
                - expected_severity
                - required_skills
              properties:
                description:
                  type: string
                  description: Incident description.
                location:
                  type: string
                  description: Address or location reference.
                expected_severity:
                  type: string
                  enum: [critical, moderate, low]
                required_skills:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Incident created successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  incident_id:
                    type: string
                    description: The ID generated for the incident (e.g. inc-004).
                  status:
                    type: string
