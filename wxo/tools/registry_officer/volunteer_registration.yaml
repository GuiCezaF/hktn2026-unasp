openapi: 3.0.0
info:
  title: Volunteer Registrar
  version: 1.0.0
  description: Registers new volunteers in the system through the Agent.
servers:
  - url: https://e59a-201-93-250-33.ngrok-free.app
paths:
  /volunteers:
    post:
      operationId: createVolunteer
      summary: Registers a new volunteer.
      description: >
        The Agent should use this tool to register people who want to volunteer
        during the conversation, collecting name, age, phone, email, skills and neighborhood.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - age
                - phone
                - email
                - skills
                - neighborhood
              properties:
                name:
                  type: string
                  description: Full name of the volunteer.
                age:
                  type: integer
                  description: Age of the volunteer.
                phone:
                  type: string
                  description: Contact phone (preferably WhatsApp).
                email:
                  type: string
                  description: Contact email.
                skills:
                  type: array
                  items:
                    type: string
                  description: List of skills (e.g. first_aid, logistics, search_and_rescue).
                neighborhood:
                  type: string
                  description: Neighborhood of residence in Hortolandia.
                city:
                  type: string
                  default: Hortolandia
      responses:
        '200':
          description: Volunteer registered successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  volunteer_id:
                    type: string
                  status:
                    type: string
