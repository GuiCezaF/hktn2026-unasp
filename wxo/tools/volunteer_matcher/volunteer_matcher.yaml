openapi: 3.0.0
info:
  title: Volunteer Matcher
  version: 1.0.0
  description: Matches available volunteers to a specific incident based on required skills and location.
servers:
  - url: https://e59a-201-93-250-33.ngrok-free.app
    description: Local Mock Server
paths:
  /volunteers/match/{incident_id}:
    get:
      operationId: matchVolunteers
      summary: Find matching volunteers for an incident
      description: >
        Returns a list of volunteers that are the best match for a given incident ID. 
        IMPORTANT: Each volunteer has a unique 3-digit ID (e.g. 101, 109). 
        The Agent MUST use this ID when calling the notification tool.
      parameters:
        - name: incident_id
          in: path
          required: true
          description: The ID of the incident to find volunteers for
          schema:
            type: string
      responses:
        '200':
          description: A list of matching volunteers
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                      description: The unique 3-digit volunteer ID. MUST be used for notifications.
                    name:
                      type: string
                    phone:
                      type: string
                    email:
                      type: string
                    skills:
                      type: array
                      items:
                        type: string
                    available:
                      type: boolean
                    transport:
                      type: string
                    location:
                      type: object
                      properties:
                        neighborhood:
                          type: string
                        city:
                          type: string
                        address:
                          type: string
